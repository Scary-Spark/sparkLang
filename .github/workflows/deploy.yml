name: FTP Deploy to Spark Subdomain

on:
  push:
    branches:
      - main

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout code
        uses: actions/checkout@v3

      - name: 🚀 Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: ./
          protocol: ftp
          port: 21

      - name: 🔄 Restart cPanel Node App
        # We use 'curl' to call the cPanel API to force a restart
        # Replace 'sparkLang' with your actual App Root folder name if it's different
        run: |
          curl -H "Authorization: cpanel ${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_API_TOKEN }}" \
          "https://${{ secrets.FTP_HOST }}:2083/execute/NodeJS/restart?app=sparkLang"
