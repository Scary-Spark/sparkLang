name: FTP Deploy to Spark Subdomain

on:
  push:
    branches:
      - main

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout code
        uses: actions/checkout@v3

      - name: 🚀 Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: ./
          protocol: ftp
          port: 21

      - name: 🔄 Force Restart via API
        run: |
          # The -k ignores SSL errors, -sS shows errors but hides progress bars
          RESPONSE=$(curl -k -sS -H "Authorization: cpanel ${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_API_TOKEN }}" \
          "https://${{ secrets.FTP_HOST }}:2083/execute/NodeJS/restart?app=sparkLang")
          
          echo "cPanel API Response: $RESPONSE"
          
          # Check if the response contains "errors":null to confirm success
          if [[ $RESPONSE == *"\"errors\":null"* ]]; then
            echo "✅ cPanel successfully received the restart command."
          else
            echo "❌ cPanel API returned an error. Check your Token or App Name."
            exit 1
          fi
