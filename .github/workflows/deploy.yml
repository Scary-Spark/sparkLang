name: FTP Deploy to Spark Subdomain

on:
  push:
    branches:
      - main

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout code
        uses: actions/checkout@v3

      - name: 🚀 Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          # Your FTP Server
          server: ${{ secrets.FTP_HOST }} 
          
          # Your FTP Username
          username: ${{ secrets.FTP_USERNAME }}
          
          # This should be stored in GitHub Secrets
          password: ${{ secrets.FTP_PASSWORD }}
          
          # The local folder in your repo to upload
          local-dir: ./
          
          # The remote path (must end with /)
          # Note: If your FTP user starts inside sparkLang, use ./
          server-dir: ./
          
          # Optional: Use state-of-the-art FTPS if supported
          protocol: ftp
          port: 21
